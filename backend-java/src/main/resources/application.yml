server:
  port: 7080
  tomcat:
    max-swallow-size: ${SERVER_TOMCAT_MAX_SWALLOW_SIZE:512MB}

spring:
  application:
    name: learning-evidence-backend
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: ${EVIDENCE_RAG_KAFKA_PRODUCER_MAX_BLOCK_MS:3000}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:512MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:512MB}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/postgres?currentSchema=learning_evidence,public}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

evidence:
  ai:
    python-base-url: http://127.0.0.1:8090
    query-timeout-seconds: 30
    index-timeout-seconds: ${EVIDENCE_AI_INDEX_TIMEOUT_SECONDS:1800}
    overview-timeout-seconds: 5
  logs:
    enabled: true
    max-batch-size: 50
    max-context-bytes: 20480
    max-stack-trace-bytes: 20480
    retention-days: 30
    internal-token: ${EVIDENCE_INTERNAL_LOG_TOKEN:}
  rag:
    kafka:
      enabled: ${EVIDENCE_RAG_KAFKA_ENABLED:false}
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
      internal-base-url: ${EVIDENCE_RAG_INTERNAL_BASE_URL:http://127.0.0.1:7080}
      internal-token: ${EVIDENCE_RAG_INTERNAL_TOKEN:}
      internal-token-file: ${EVIDENCE_RAG_INTERNAL_TOKEN_FILE:}
      fallback:
        enabled: ${EVIDENCE_RAG_KAFKA_FALLBACK_ENABLED:true}
        health-check-timeout-ms: ${EVIDENCE_RAG_KAFKA_HEALTH_CHECK_TIMEOUT_MS:1500}
        publish-timeout-ms: ${EVIDENCE_RAG_KAFKA_PUBLISH_TIMEOUT_MS:3000}
      consumer:
        max-attempts: ${EVIDENCE_RAG_KAFKA_CONSUMER_MAX_ATTEMPTS:3}
        retry-delay-ms: ${EVIDENCE_RAG_KAFKA_CONSUMER_RETRY_DELAY_MS:1000}
      topics:
        index-request: rag.material.index.request.v1
        upload-finalize-request: rag.upload.finalize.request.v1
        progress: rag.material.index.progress.v1
        index-result: rag.material.index.result.v1
        promote-request: rag.material.index.promote.request.v1
        promote-result: rag.material.index.promote.result.v1
        index-dlq: rag.material.index.dlq.v1
        upload-finalize-dlq: rag.upload.finalize.dlq.v1
      groups:
        upload-finalizers: rag-java-upload-finalizers
        progress-writers: rag-java-progress-writers
        result-writers: rag-java-result-writers
        promote-result-writers: rag-java-promote-result-writers
        dlq-writers: rag-java-dlq-writers
      outbox:
        batch-size: ${EVIDENCE_RAG_OUTBOX_BATCH_SIZE:50}
        lease-seconds: ${EVIDENCE_RAG_OUTBOX_LEASE_SECONDS:60}
        publish-fixed-delay-ms: ${EVIDENCE_RAG_OUTBOX_PUBLISH_FIXED_DELAY_MS:1000}
        max-attempts: ${EVIDENCE_RAG_OUTBOX_MAX_ATTEMPTS:8}
  agent:
    internal-token: ${EVIDENCE_AGENT_INTERNAL_TOKEN:}
    java-base-url: ${EVIDENCE_AGENT_JAVA_BASE_URL:http://127.0.0.1:7080}
    start-timeout-seconds: ${EVIDENCE_AGENT_START_TIMEOUT_SECONDS:10}
    redis:
      enabled: ${EVIDENCE_AGENT_REDIS_ENABLED:true}
      running-context-ttl-hours: ${EVIDENCE_AGENT_REDIS_RUNNING_CONTEXT_TTL_HOURS:24}
      completed-context-ttl-days: ${EVIDENCE_AGENT_REDIS_COMPLETED_CONTEXT_TTL_DAYS:7}
      message-ttl-days: ${EVIDENCE_AGENT_REDIS_MESSAGE_TTL_DAYS:7}
      sse-ttl-hours: ${EVIDENCE_AGENT_REDIS_SSE_TTL_HOURS:2}
      sse-max-events: ${EVIDENCE_AGENT_REDIS_SSE_MAX_EVENTS:120}
  tools:
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: ${EVIDENCE_TAVILY_BASE_URL:https://api.tavily.com}
      timeout-seconds: ${EVIDENCE_TAVILY_TIMEOUT_SECONDS:15}
  storage:
    provider: ${EVIDENCE_STORAGE_PROVIDER:local}
    local-root: ${EVIDENCE_UPLOAD_ROOT:uploads/rag}
    oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      bucket: ${ALIYUN_OSS_BUCKET:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:learning-evidence}
      public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
