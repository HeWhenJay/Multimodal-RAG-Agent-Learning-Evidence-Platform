server:
  port: 0

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:evidence-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

evidence:
  ai:
    python-base-url: http://127.0.0.1:8090
    query-timeout-seconds: 1
    index-timeout-seconds: 1
    overview-timeout-seconds: 1
  storage:
    provider: local
    local-root: target/test-uploads/rag
