# Python AI 服务本地联调配置。
# 可暴露配置写默认值，敏感配置只通过 ${环境变量:默认值} 注入。

server:
  host: ${AI_SERVICE_HOST:127.0.0.1}
  port: ${AI_SERVICE_PORT:8090}
  reload: ${AI_SERVICE_RELOAD:true}

rag:
  store:
    backend: ${RAG_STORE_BACKEND:pgvector}
  database:
    url: ${RAG_DATABASE_URL:postgresql://postgres:123456@127.0.0.1:5433/postgres?options=-csearch_path%3Dlearning_evidence%2Cpublic}
    schema: ${RAG_DATABASE_SCHEMA:learning_evidence}
  vector:
    dimensions: ${RAG_VECTOR_DIMENSIONS:1024}
  embedding:
    provider: ${RAG_EMBEDDING_PROVIDER:dashscope}
    model: ${RAG_EMBEDDING_MODEL:text-embedding-v4}
    base-url: ${RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-seconds: ${RAG_EMBEDDING_TIMEOUT_SECONDS:30}
  rerank:
    provider: ${RAG_RERANK_PROVIDER:auto}
    model: ${RAG_RERANK_MODEL:qwen3-rerank}
    base-url: ${RAG_RERANK_BASE_URL:https://dashscope.aliyuncs.com}
    timeout-seconds: ${RAG_RERANK_TIMEOUT_SECONDS:30}
  fusion:
    strategy: ${RAG_FUSION_STRATEGY:weighted_rrf}
    rrf-k: ${RAG_FUSION_RRF_K:60}
    bm25-weight: ${RAG_FUSION_BM25_WEIGHT:1.0}
    vector-weight: ${RAG_FUSION_VECTOR_WEIGHT:1.0}
    original-query-weight: ${RAG_FUSION_ORIGINAL_QUERY_WEIGHT:1.2}
    expanded-query-weight: ${RAG_FUSION_EXPANDED_QUERY_WEIGHT:1.0}
    score-blend: ${RAG_FUSION_SCORE_BLEND:0.15}
    diagnostic-limit: ${RAG_FUSION_DIAGNOSTIC_LIMIT:20}
  local-rerank:
    fusion-weight: ${RAG_LOCAL_RERANK_FUSION_WEIGHT:0.40}
    lexical-weight: ${RAG_LOCAL_RERANK_LEXICAL_WEIGHT:0.35}
    title-weight: ${RAG_LOCAL_RERANK_TITLE_WEIGHT:0.15}
    rank-weight: ${RAG_LOCAL_RERANK_RANK_WEIGHT:0.10}
  answer-guard:
    min-answerable-score: ${RAG_ANSWER_MIN_ANSWERABLE_SCORE:0.45}
    min-top-score-dashscope: ${RAG_ANSWER_MIN_TOP_SCORE_DASHSCOPE:0.55}
    min-top-score-local: ${RAG_ANSWER_MIN_TOP_SCORE_LOCAL:0.25}
    min-keyword-coverage: ${RAG_ANSWER_MIN_KEYWORD_COVERAGE:0.08}
    min-supporting-evidence-count: ${RAG_ANSWER_MIN_SUPPORTING_EVIDENCE_COUNT:1}
    strict-mode: ${RAG_ANSWER_STRICT_MODE:true}
  llm:
    provider: ${RAG_ANSWER_PROVIDER:auto}
    model: ${RAG_LLM_MODEL:qwen-plus}
    base-url: ${RAG_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-seconds: ${RAG_LLM_TIMEOUT_SECONDS:45}
    temperature: ${RAG_LLM_TEMPERATURE:0.2}
  progress:
    console-enabled: ${RAG_CONSOLE_PROGRESS_ENABLED:true}
  process-log:
    console-enabled: ${RAG_CONSOLE_PROCESS_ENABLED:true}
  kafka:
    enabled: ${RAG_KAFKA_ENABLED:false}
    bootstrap-servers: ${RAG_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    worker:
      reconnect-initial-seconds: ${RAG_KAFKA_RECONNECT_INITIAL_SECONDS:1}
      reconnect-max-seconds: ${RAG_KAFKA_RECONNECT_MAX_SECONDS:30}
    producer:
      flush-seconds: ${RAG_KAFKA_PRODUCER_FLUSH_SECONDS:5}
      message-timeout-ms: ${RAG_KAFKA_PRODUCER_MESSAGE_TIMEOUT_MS:5000}
    topics:
      index-request: ${RAG_KAFKA_TOPIC_INDEX_REQUEST:rag.material.index.request.v1}
      index-result: ${RAG_KAFKA_TOPIC_INDEX_RESULT:rag.material.index.result.v1}
      progress: ${RAG_KAFKA_TOPIC_PROGRESS:rag.material.index.progress.v1}
      promote-request: ${RAG_KAFKA_TOPIC_PROMOTE_REQUEST:rag.material.index.promote.request.v1}
      promote-result: ${RAG_KAFKA_TOPIC_PROMOTE_RESULT:rag.material.index.promote.result.v1}
      index-retry-1m: ${RAG_KAFKA_TOPIC_INDEX_RETRY_1M:rag.material.index.retry.1m.v1}
      index-retry-10m: ${RAG_KAFKA_TOPIC_INDEX_RETRY_10M:rag.material.index.retry.10m.v1}
      index-retry-1h: ${RAG_KAFKA_TOPIC_INDEX_RETRY_1H:rag.material.index.retry.1h.v1}
      index-dlq: ${RAG_KAFKA_TOPIC_INDEX_DLQ:rag.material.index.dlq.v1}
    retry:
      max-attempts: ${RAG_KAFKA_MAX_ATTEMPTS:3}
      delay-1m-seconds: ${RAG_KAFKA_RETRY_1M_SECONDS:60}
      delay-10m-seconds: ${RAG_KAFKA_RETRY_10M_SECONDS:600}
      delay-1h-seconds: ${RAG_KAFKA_RETRY_1H_SECONDS:3600}
      max-sleep-seconds: ${RAG_KAFKA_RETRY_MAX_SLEEP_SECONDS:30}
    progress:
      chunk-interval: ${RAG_KAFKA_PROGRESS_CHUNK_INTERVAL:10}
      min-seconds: ${RAG_KAFKA_PROGRESS_MIN_SECONDS:2}
  staging-retention-hours: ${RAG_STAGING_RETENTION_HOURS:24}
  staging-failed-retention-hours: ${RAG_STAGING_FAILED_RETENTION_HOURS:168}

workers:
  # run.py 统一监督 API、cron、RAG、Agent 和 Kafka worker；worker 均不在 Web 进程内执行。
  cron:
    enabled: ${AI_CRON_ENABLED:true}
    poll-interval-seconds: ${AI_CRON_POLL_INTERVAL_SECONDS:0.5}
  outbox:
    enabled: ${RAG_OUTBOX_PUBLISHER_ENABLED:true}
    batch-size: ${RAG_OUTBOX_BATCH_SIZE:50}
    lease-seconds: ${RAG_OUTBOX_LEASE_SECONDS:60}
    publish-fixed-delay-ms: ${RAG_OUTBOX_PUBLISH_FIXED_DELAY_MS:1000}
    max-attempts: ${RAG_OUTBOX_MAX_ATTEMPTS:8}
    publish-timeout-ms: ${RAG_KAFKA_PUBLISH_TIMEOUT_MS:3000}
  staging-cleanup:
    enabled: ${RAG_STAGING_CLEANUP_ENABLED:false}
    fixed-delay-seconds: ${RAG_STAGING_CLEANUP_FIXED_DELAY_SECONDS:3600}
  kafka:
    # 留空时跟随 RAG_KAFKA_ENABLED；可显式设为 false 只发布不在本进程消费。
    enabled: ${AI_KAFKA_WORKER_ENABLED:}
  agent:
    enabled: ${AI_AGENT_WORKER_ENABLED:true}
    poll-interval-seconds: ${AI_AGENT_WORKER_POLL_INTERVAL_SECONDS:0.5}
  rag-task:
    enabled: ${RAG_TASK_WORKER_ENABLED:true}
    poll-interval-seconds: ${RAG_TASK_WORKER_POLL_SECONDS:1}
    batch-size: ${RAG_TASK_WORKER_BATCH_SIZE:4}
    lease-seconds: ${RAG_TASK_WORKER_LEASE_SECONDS:120}
    query-task-ttl-seconds: ${RAG_QUERY_TASK_TTL_SECONDS:1800}
    local-index-enabled: ${RAG_LOCAL_INDEX_WORKER_ENABLED:true}

auth:
  database-url: ${AUTH_DATABASE_URL:}

logs:
  enabled: ${EVIDENCE_LOGS_ENABLED:true}
  max-batch-size: ${EVIDENCE_LOGS_MAX_BATCH_SIZE:100}
  max-context-bytes: ${EVIDENCE_LOGS_MAX_CONTEXT_BYTES:20000}
  max-stack-trace-bytes: ${EVIDENCE_LOGS_MAX_STACK_TRACE_BYTES:20000}

storage:
  provider: ${EVIDENCE_STORAGE_PROVIDER:local}
  local-root: ${EVIDENCE_UPLOAD_ROOT:uploads/rag}
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:learning-evidence}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}

database:
  # 仅执行 Python 的幂等增量迁移；空库先运行 app.core.database_bootstrap。
  migrations-enabled: ${AI_DATABASE_MIGRATIONS_ENABLED:true}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

mineru:
  command: ${MINERU_COMMAND:}
  token: ${MINERU_TOKEN:}
  api-token: ${MINERU_API_TOKEN:}
  api-key: ${MINERU_API_KEY:}

ocr:
  lang: ${OCR_LANG:chi_sim+eng}
  bailian:
    enabled: ${BAILIAN_OCR_ENABLED:auto}
    model: ${BAILIAN_OCR_MODEL:qwen3.5-ocr}
    base-url: ${BAILIAN_OCR_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-seconds: ${BAILIAN_OCR_TIMEOUT_SECONDS:60}
    max-image-bytes: ${BAILIAN_OCR_MAX_IMAGE_BYTES:10485760}
    max-attempts: ${BAILIAN_OCR_MAX_ATTEMPTS:3}
    retry-delay-seconds: ${BAILIAN_OCR_RETRY_DELAY_SECONDS:2}

asr:
  provider: ${RAG_ASR_PROVIDER:auto}
  base-url: ${RAG_ASR_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  task-base-url: ${RAG_ASR_TASK_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
  model: ${RAG_ASR_MODEL:qwen3-asr-flash}
  filetrans-model: ${RAG_ASR_FILETRANS_MODEL:qwen3-asr-flash-filetrans}
  filetrans-enabled: ${RAG_ASR_FILETRANS_ENABLED:auto}
  enable-words: ${RAG_ASR_ENABLE_WORDS:false}
  timeout-seconds: ${RAG_ASR_TIMEOUT_SECONDS:120}
  max-audio-bytes: ${RAG_ASR_MAX_AUDIO_BYTES:10485760}
  filetrans-max-polls: ${RAG_ASR_FILETRANS_MAX_POLLS:30}
  filetrans-poll-interval-seconds: ${RAG_ASR_FILETRANS_POLL_INTERVAL_SECONDS:2}

video:
  ffmpeg-command: ${FFMPEG_COMMAND:}
  ffprobe-command: ${FFPROBE_COMMAND:}
  ffmpeg-timeout-seconds: ${RAG_VIDEO_FFMPEG_TIMEOUT_SECONDS:1800}
  audio-segment-seconds: ${RAG_VIDEO_AUDIO_SEGMENT_SECONDS:300}
  audio-overlap-seconds: ${RAG_VIDEO_AUDIO_OVERLAP_SECONDS:10}
  frame-scan-mode: ${RAG_VIDEO_FRAME_SCAN_MODE:auto}
  frame-sample-interval-seconds: ${RAG_VIDEO_FRAME_SAMPLE_INTERVAL_SECONDS:5}
  frame-interval-seconds: ${RAG_VIDEO_FRAME_INTERVAL_SECONDS:30}
  frame-min-interval-seconds: ${RAG_VIDEO_FRAME_MIN_INTERVAL_SECONDS:30}
  max-frames: ${RAG_VIDEO_MAX_FRAMES:}
  frame-target-candidates: ${RAG_VIDEO_FRAME_TARGET_CANDIDATES:360}
  frame-max-candidates: ${RAG_VIDEO_FRAME_MAX_CANDIDATES:720}
  ppt-flip-diff-threshold: ${RAG_VIDEO_PPT_FLIP_DIFF_THRESHOLD:0.08}
  frame-visual-dedup-enabled: ${RAG_VIDEO_FRAME_VISUAL_DEDUP_ENABLED:true}
  frame-visual-hash-algorithm: ${RAG_VIDEO_FRAME_VISUAL_HASH_ALGORITHM:dhash}
  frame-visual-hash-max-distance: ${RAG_VIDEO_FRAME_VISUAL_HASH_MAX_DISTANCE:4}
  frame-visual-ambiguous-margin: ${RAG_VIDEO_FRAME_VISUAL_AMBIGUOUS_MARGIN:2}
  frame-max-representatives-per-visual-group: ${RAG_VIDEO_FRAME_MAX_REPRESENTATIVES_PER_VISUAL_GROUP:1}
  frame-visual-verify-interval-seconds: ${RAG_VIDEO_FRAME_VISUAL_VERIFY_INTERVAL_SECONDS:900}
  frame-visual-stay-verify-seconds: ${RAG_VIDEO_FRAME_VISUAL_STAY_VERIFY_SECONDS:600}
  frame-visual-revisit-verify-seconds: ${RAG_VIDEO_FRAME_VISUAL_REVISIT_VERIFY_SECONDS:1800}
  frame-visual-verification-ratio: ${RAG_VIDEO_FRAME_VISUAL_VERIFICATION_RATIO:0.25}
  frame-max-verifications-per-visual-group: ${RAG_VIDEO_FRAME_MAX_VERIFICATIONS_PER_VISUAL_GROUP:2}
  segment-seconds: ${RAG_VIDEO_SEGMENT_SECONDS:120}
  segment-max-cues: ${RAG_VIDEO_SEGMENT_MAX_CUES:6}

document:
  convert:
    libreoffice-command: ${LIBREOFFICE_COMMAND:}
    soffice-command: ${SOFFICE_COMMAND:}

environment:
  DATABASE_URL: ${DATABASE_URL:}
  DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
  DASHSCOPE_EMBEDDING_BASE_URL: ${DASHSCOPE_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
